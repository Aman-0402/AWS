<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AWS eBook Modules</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
      color: #ff9900;
    }

    p {
      margin-bottom: 40px;
      color: #ddd;
    }

    .modules {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .module-card {
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 15px;
      transition: 0.3s ease;
      cursor: pointer;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .module-card:hover {
      transform: translateY(-10px);
      background: rgba(255,153,0,0.2);
      box-shadow: 0 0 20px rgba(255,153,0,0.4);
    }

    .module-card h3 {
      margin-bottom: 10px;
      color: #ffcc00;
    }

    .module-card p {
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>AWS eBook 🚀</h1>
    <p>Select a Module to Begin Learning</p>

    <div class="modules">

      <div class="module-card" onclick="openModule('aws-intro.html')">
        <h3>MODULE 1 – Welcome to AWS Academy Data Engineering</h3>
        <p>Introduction to Data Engineering and AWS</p>
      </div>

      <div class="module-card" onclick="openModule('ec2.html')">
        <h3>Module 2: EC2</h3>
        <p>Virtual Servers in the Cloud</p>
      </div>

      <div class="module-card" onclick="openModule('s3.html')">
        <h3>Module 3: S3</h3>
        <p>Scalable Storage in AWS</p>
      </div>

      <div class="module-card" onclick="openModule('iam.html')">
        <h3>Module 4: IAM</h3>
        <p>Identity and Access Management</p>
      </div>

    </div>
  </div>

  <script>
    function openModule(page) {
      window.location.href = "topics/" + page;
    }
  </script>

</body>
</html>
